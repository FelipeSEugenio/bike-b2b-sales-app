<template>
    <lightning-card title="Bike Catalog">
        <div class="slds-p-around_medium">

            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Carregando"></lightning-spinner>
            </template>

            <template if:true={errorMessage}>
                <div class="slds-text-color_error">{errorMessage}</div>
            </template>

            <template if:true={hasBikes}>
                <div class="slds-grid slds-wrap">
                    <template for:each={bikes} for:item="bike">
                        <div key={bike.Id} class="slds-col slds-size_1-of-3 slds-p-around_small">
                            <lightning-card title={bike.Name}>

                                <div class="slds-p-horizontal_small slds-p-top_small">
                                    <img src={bike.Image_URL_c__c}
     alt={bike.Name}
     style="width:100%; height:180px; object-fit:contain; display:block;" />
                                </div>

                                <p class="slds-p-horizontal_small slds-p-top_small">
                                    Type: {bike.Bike_Type__c}
                                </p>
                                <p class="slds-p-horizontal_small slds-p-bottom_small">
                                    Price: ${bike.Price__c}
                                </p>

                            </lightning-card>
                        </div>
                    </template>
                </div>
            </template>

            <template if:false={hasBikes}>
                <template if:false={isLoading}>
                    <div>Nenhuma bike ativa encontrada.</div>
                </template>
            </template>

        </div>
    </lightning-card>
</template>
