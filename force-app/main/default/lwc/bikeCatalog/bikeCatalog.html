<template>
    <lightning-card title="Bike Catalog">
        <div class="slds-p-around_medium">

            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Carregando"></lightning-spinner>
            </template>

            <template if:true={errorMessage}>
                <div class="slds-text-color_error">{errorMessage}</div>
            </template>

            <template if:true={hasBikes}>
                <div class="catalog-grid">
                    <template for:each={bikes} for:item="bike">
                        <article
                            key={bike.Id}
                            class="bike-card"
                            data-id={bike.Id}
                            onclick={handleBikeClick}
                        >
                            <div class="bike-image-wrapper">
                                <img
                                    class="bike-image"
                                    src={bike.Image_URL_c__c}
                                    alt={bike.Name}
                                />
                            </div>

                            <div class="bike-content">
                                <h3 class="bike-name">{bike.Name}</h3>

                                <div class="bike-type">
                                    <lightning-badge label={bike.Bike_Type__c}></lightning-badge>
                                </div>

                                <div class="bike-price">
                                    <lightning-formatted-number
                                        value={bike.Price__c}
                                        format-style="currency"
                                        currency-code="USD">
                                    </lightning-formatted-number>
                                </div>
                            </div>
                        </article>
                    </template>
                </div>
            </template>

            <template if:false={hasBikes}>
                <template if:false={isLoading}>
                    <div>Nenhuma bike ativa encontrada.</div>
                </template>
            </template>

        </div>
    </lightning-card>
</template>
